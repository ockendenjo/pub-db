name: PR
on:
  pull_request: { }

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yaml

  build:
    name: Go
    uses: ./.github/workflows/go-build.yaml
