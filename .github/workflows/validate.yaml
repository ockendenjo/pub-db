name: Validate

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

# JSON validation

      - name: Install JSON validator
        run: |
          wget https://github.com/neilpa/yajsv/releases/download/v1.4.1/yajsv.linux.amd64
          echo "4bd6d2b1d6292ab1f7ba63db83c182a603a790d431429cf71f05cb0fcc677def  yajsv.linux.amd64" | sha256sum -c
          chmod +x ./yajsv.linux.amd64

      - name: Validate JSON
        run: |
          ./yajsv.linux.amd64 -s schema/pub.schema.json pubs/*.json

# Terraform validation

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Run script
        shell: bash
        working-directory: stack
        run: |
          terraform fmt -check -recursive
